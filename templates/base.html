<!DOCTYPE html>
<html>
<head>
    <title>Animaciones C&C</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='imagenes/Logo.png') }}" sizes="32x32">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fff5f9;
            color: #333;
        }
        header {
            background: linear-gradient(135deg, #fce4ec, #f8bbd0);
            padding: 30px 20px 20px;
            text-align: center;
        }
        header img {
            width: 180px;
            height: auto;
            border-radius: 0;
            object-fit: contain;
        }
        nav {
            background-color: #f48fb1;
            padding: 12px;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .contenido {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h2 {
            color: #e91e8c;
            margin-bottom: 10px;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 28px;
            background-color: #f48fb1;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #e91e8c;
        }
        footer {
            text-align: center;
            padding: 30px 20px;
            background-color: #f48fb1;
            color: white;
            margin-top: 60px;
            font-size: 14px;
        }
                .footer-redes {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .footer-redes a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: none;
            padding: 0;
            margin: 0;
        }
        .footer-redes a img {
            width: 24px;
            height: 24px;
            border-radius: 0;
            object-fit: contain;
        }
        .footer-redes a:hover {
            text-decoration: underline;
        }
    </style>
    
</head>
<body>
    <header>
        <img src="{{ url_for('static', filename='imagenes/Logo.png') }}" alt="Logo Animaciones C&C" />
    </header>
    <nav>
        <a href="/">Inicio</a>
        <a href="/servicios">Servicios</a>
        <a href="/contacto">Contacto</a>
    </nav>

    <div class="contenido">
        {% block contenido %}{% endblock %}
    </div>

    <footer>
    <div class="footer-redes">
        <a href="https://instagram.com/animacionescyc" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram" />
            Instagram C&C
        </a>
        <a href="https://wa.me/5491125539044" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp" />
            WhatsApp
        </a>
        <a href="https://instagram.com/melinadiazfotografia" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram" />
            Instagram Fotografía
        </a>
        <a href="https://facebook.com/animaciones.cecilia" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook" />
            Facebook
        </a>
    </div>
    <p>© 2026 Animaciones C&C Todos los derechos reservados</p>
    </footer>
</body>
</html>
