{% extends "base.html" %}

{% block contenido %}

{% for servicio in servicios %}
    <div class="servicio">
        <h2>{{ servicio.nombre }}</h2>
        <p>💰 Precio por hora: {{ servicio.Precio }}</p>
        <p>🚗 Viático: {{ servicio.Viatico }}</p>
        <p>{{ servicio.descripcion }}</p>
    </div>
{% endfor %}

{% endblock %}
